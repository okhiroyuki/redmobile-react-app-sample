name: Node.js CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.1
      - name: Use Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18.0'
      - run: npm i -g yarn
      - run: yarn
      - run: npm run lint
